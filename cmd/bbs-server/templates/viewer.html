<!DOCTYPE html>
<html>
<head>
    <title>BBS Match Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3efe5;
            --panel: #fffaf0;
            --ink: #14213d;
            --line: #d8d1bf;
            --accent: #0b7285;
            --danger: #9f1f35;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, rgba(239, 125, 87, 0.12), transparent 30%),
                radial-gradient(circle at 90% 20%, rgba(11, 114, 133, 0.12), transparent 35%),
                var(--bg);
            min-height: 100vh;
        }

        .shell {
            width: min(1100px, 95vw);
            margin: 1.4rem auto 2.2rem;
            display: grid;
            gap: 1rem;
        }

        .panel {
            border: 2px solid var(--ink);
            background: var(--panel);
            padding: 0.9rem;
            box-shadow: 6px 6px 0 rgba(20, 33, 61, 0.15);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.2rem, 2.8vw, 1.8rem);
        }

        .subtitle {
            margin: 0.3rem 0 0;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.87rem;
            color: #334;
        }

        .back-link {
            text-decoration: none;
            color: white;
            background: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.4rem 0.55rem;
            font-size: 0.9rem;
        }

        .viewer-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1rem;
        }

        .canvas-wrap {
            border: 1px solid var(--line);
            background: white;
            padding: 0.5rem;
            overflow: auto;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #fdfdfd;
            border: 1px solid #ece8db;
        }

        .controls {
            display: grid;
            gap: 0.55rem;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            align-items: center;
        }

        .controls button,
        .controls select,
        .controls input[type="range"] {
            font: inherit;
        }

        .controls button {
            border: 1px solid var(--ink);
            background: white;
            padding: 0.35rem 0.5rem;
            cursor: pointer;
        }

        .controls button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .meta {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.82rem;
            border: 1px solid var(--line);
            background: white;
            padding: 0.55rem;
            white-space: pre-wrap;
        }

        .status {
            margin: 0;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.82rem;
            color: #334;
        }

        .status.error {
            color: var(--danger);
            font-weight: 600;
        }

        .cards {
            display: grid;
            gap: 0.45rem;
        }

        .card {
            border: 1px solid var(--line);
            background: white;
            padding: 0.5rem;
        }

        .card-title {
            margin: 0 0 0.25rem;
            font-size: 0.82rem;
            color: #334;
            font-family: "IBM Plex Mono", monospace;
        }

        .card-value {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            overflow-wrap: anywhere;
        }

        details {
            margin-top: 0.65rem;
        }

        pre {
            margin: 0.5rem 0 0;
            max-height: 260px;
            overflow: auto;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.78rem;
            background: #182430;
            color: #b8f3d0;
            padding: 0.55rem;
        }

        @media (max-width: 900px) {
            .viewer-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="panel">
            <div class="top-row">
                <div>
                    <h1>Viewer</h1>
                    <p class="subtitle" id="mode-label">Loading...</p>
                </div>
                <a class="back-link" href="/">Back</a>
            </div>
        </div>

        <div class="panel viewer-grid">
            <div class="canvas-wrap">
                <canvas id="viewer-canvas" width="760" height="300"></canvas>
                <p id="status" class="status">Waiting for data...</p>
                <details>
                    <summary>Raw Frame JSON</summary>
                    <pre id="raw-frame">(no frame yet)</pre>
                </details>
            </div>

            <div class="controls">
                <div class="control-row">
                    <button id="prev-btn" type="button">Prev</button>
                    <button id="play-btn" type="button">Play</button>
                    <button id="next-btn" type="button">Next</button>
                </div>

                <div class="control-row">
                    <label for="frame-slider">Frame</label>
                    <input id="frame-slider" type="range" min="0" max="0" step="1" value="0" style="width: 170px;">
                    <span id="frame-label" class="meta">0 / 0</span>
                </div>

                <div class="control-row">
                    <label for="speed-select">Speed</label>
                    <select id="speed-select">
                        <option value="1200">0.75x</option>
                        <option value="900" selected>1x</option>
                        <option value="550">1.5x</option>
                        <option value="320">2.5x</option>
                    </select>
                </div>

                <div id="meta" class="meta">Mode: -\nGame: -\nPlugin entry: -</div>

                <div id="player-cards" class="cards"></div>
            </div>
        </div>
    </div>

    <script>
    (function () {
        const arenaId = Number({{.ArenaID}} || 0);
        const matchId = Number({{.MatchID}} || 0);
        const adminKey = {{printf "%q" .AdminKey}};

        const canvas = document.getElementById("viewer-canvas");
        const ctx = canvas.getContext("2d");
        const statusEl = document.getElementById("status");
        const modeLabelEl = document.getElementById("mode-label");
        const metaEl = document.getElementById("meta");
        const rawFrameEl = document.getElementById("raw-frame");
        const playerCardsEl = document.getElementById("player-cards");

        const prevBtn = document.getElementById("prev-btn");
        const playBtn = document.getElementById("play-btn");
        const nextBtn = document.getElementById("next-btn");
        const frameSlider = document.getElementById("frame-slider");
        const frameLabel = document.getElementById("frame-label");
        const speedSelect = document.getElementById("speed-select");

        let mode = "idle";
        let gameName = "";
        let pluginMeta = null;
        let replayFrames = [];
        let replayIndex = 0;
        let replayTimer = null;
        let players = [];
        let lastLiveEvent = null;

        let activePluginRenderer = null;
        let activePluginGame = "";
        let activePluginEntryURL = "";
        const loadedPluginEntries = new Set();
        const pluginRenderers = new Map();

        function setStatus(message, isError) {
            statusEl.textContent = message;
            statusEl.classList.toggle("error", !!isError);
        }

        function clearCanvasNotice(message) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#f7f3e8";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#14213d";
            ctx.font = "700 22px Space Grotesk";
            ctx.fillText("Viewer Plugin", 24, 42);
            ctx.font = "13px IBM Plex Mono";
            ctx.fillStyle = "#425";
            ctx.fillText(message, 24, 72);
        }

        function updateFrameLabel() {
            const total = replayFrames.length;
            frameLabel.textContent = total === 0 ? "0 / 0" : String(replayIndex + 1) + " / " + String(total);
        }

        function updateControlState() {
            const replayMode = mode === "replay";
            const hasFrames = replayFrames.length > 0;
            prevBtn.disabled = !replayMode || !hasFrames;
            nextBtn.disabled = !replayMode || !hasFrames;
            frameSlider.disabled = !replayMode || !hasFrames;
            speedSelect.disabled = !replayMode;
            if (mode === "live") {
                playBtn.disabled = true;
                playBtn.textContent = "Live";
            } else {
                playBtn.disabled = !replayMode || !hasFrames;
                playBtn.textContent = replayTimer ? "Pause" : "Play";
            }
        }

        function updateMeta(frame) {
            const lines = [];
            lines.push("Mode: " + mode);
            lines.push("Game: " + (gameName || "-"));
            lines.push("Plugin entry: " + ((pluginMeta && pluginMeta.entry_url) || "-"));
            if (frame) {
                lines.push("Move index: " + String(frame.move_index || 0));
                lines.push("Timestamp: " + String(frame.timestamp || "-"));
                lines.push("Terminal: " + String(!!frame.is_terminal));
                if (frame.winner) {
                    lines.push("Winner: " + String(frame.winner));
                }
            }
            metaEl.textContent = lines.join("\n");
        }

        function renderPlayers() {
            playerCardsEl.innerHTML = "";
            if (!Array.isArray(players) || players.length === 0) {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = '<p class="card-title">Players</p><p class="card-value">No players reported.</p>';
                playerCardsEl.appendChild(card);
                return;
            }

            for (const player of players) {
                const card = document.createElement("div");
                card.className = "card";
                const name = player && player.name ? player.name : "Unknown";
                const pid = player && Number.isFinite(player.player_id) ? player.player_id : "?";
                const bot = player && player.bot_id ? player.bot_id : "-";
                const wins = player && Number.isFinite(player.wins) ? player.wins : 0;
                const losses = player && Number.isFinite(player.losses) ? player.losses : 0;
                const draws = player && Number.isFinite(player.draws) ? player.draws : 0;
                card.innerHTML =
                    '<p class="card-title">P' + pid + '</p>' +
                    '<p class="card-value">' + name + '</p>' +
                    '<p class="card-title">Bot: ' + bot + '</p>' +
                    '<p class="card-title">W/L/D: ' + wins + '/' + losses + '/' + draws + '</p>';
                playerCardsEl.appendChild(card);
            }
        }

        function activatePluginRenderer(game) {
            const key = String(game || "").trim().toLowerCase();
            activePluginGame = key;
            activePluginRenderer = pluginRenderers.get(key) || null;
            return activePluginRenderer;
        }

        function maybeLoadPluginRenderer(meta, game) {
            const key = String(game || "").trim().toLowerCase();
            if (!meta || !meta.entry_url) {
                activePluginRenderer = null;
                activePluginGame = key;
                activePluginEntryURL = "";
                return Promise.resolve(false);
            }

            const entryURL = meta.entry_url;
            activePluginEntryURL = entryURL;
            activatePluginRenderer(key);
            if (activePluginRenderer) {
                return Promise.resolve(true);
            }

            if (loadedPluginEntries.has(entryURL)) {
                return Promise.resolve(!!activatePluginRenderer(key));
            }

            return new Promise(function (resolve) {
                const script = document.createElement("script");
                script.src = entryURL;
                script.async = true;

                script.addEventListener("load", function () {
                    loadedPluginEntries.add(entryURL);
                    resolve(!!activatePluginRenderer(key));
                });

                script.addEventListener("error", function () {
                    setStatus("Failed to load viewer plugin script.", true);
                    resolve(false);
                });

                document.head.appendChild(script);
            });
        }

        function renderCurrentFrame(frame, frameIndex, frameTotal) {
            rawFrameEl.textContent = frame ? JSON.stringify(frame, null, 2) : "(no frame yet)";
            updateMeta(frame || null);
            if (!frame) {
                clearCanvasNotice("No frame available.");
                return;
            }

            let rendered = false;
            if (activePluginRenderer && typeof activePluginRenderer.render === "function") {
                try {
                    rendered = activePluginRenderer.render({
                        canvas: canvas,
                        ctx: ctx,
                        spec: null,
                        frame: frame,
                        frames: replayFrames,
                        frameIndex: frameIndex,
                        frameTotal: frameTotal,
                        players: players,
                        mode: mode,
                        pluginEntryURL: activePluginEntryURL,
                    }) === true;
                } catch (err) {
                    rendered = false;
                    setStatus("Plugin renderer error: " + (err && err.message ? err.message : String(err)), true);
                }
            }

            if (!rendered) {
                clearCanvasNotice("No plugin renderer registered for game '" + (gameName || "unknown") + "'.");
            }
        }

        function stopReplayTimer() {
            if (replayTimer) {
                clearInterval(replayTimer);
                replayTimer = null;
            }
            updateControlState();
        }

        function startReplayTimer() {
            stopReplayTimer();
            const interval = Number(speedSelect.value) || 900;
            replayTimer = setInterval(function () {
                if (replayFrames.length === 0) {
                    stopReplayTimer();
                    return;
                }
                replayIndex = (replayIndex + 1) % replayFrames.length;
                frameSlider.value = String(replayIndex);
                updateFrameLabel();
                renderCurrentFrame(replayFrames[replayIndex], replayIndex, replayFrames.length);
            }, interval);
            updateControlState();
        }

        function buildViewerURL(path, params) {
            const url = new URL(path, window.location.origin);
            if (params && typeof params === "object") {
                for (const key of Object.keys(params)) {
                    const value = params[key];
                    if (value === undefined || value === null || value === "") {
                        continue;
                    }
                    url.searchParams.set(key, String(value));
                }
            }

            const current = new URL(window.location.href);
            const streamInterval = current.searchParams.get("stream_interval_ms");
            const maxHz = current.searchParams.get("max_hz");
            if (streamInterval) {
                url.searchParams.set("stream_interval_ms", streamInterval);
            }
            if (maxHz) {
                url.searchParams.set("max_hz", maxHz);
            }
            if (adminKey) {
                url.searchParams.set("admin_key", adminKey);
            }
            return url.toString();
        }

        async function loadReplay() {
            mode = "replay";
            modeLabelEl.textContent = "Replay mode";
            updateControlState();
            setStatus("Loading replay frames...", false);

            const response = await fetch(buildViewerURL("/viewer/replay-data", {
                match_id: matchId,
                max_frames: 5000,
            }));
            if (!response.ok) {
                throw new Error("Replay request failed with status " + response.status);
            }

            const payload = await response.json();
            replayFrames = Array.isArray(payload.frames) ? payload.frames : [];
            replayIndex = 0;
            gameName = String(payload.game || "").trim().toLowerCase();
            pluginMeta = payload.plugin || null;
            players = Array.isArray(payload.players) ? payload.players : [];

            renderPlayers();

            const loaded = await maybeLoadPluginRenderer(pluginMeta, gameName);
            if (!loaded) {
                setStatus("Plugin renderer is unavailable. Check plugin manifest and bundle loading.", true);
            } else {
                setStatus("Replay loaded.", false);
            }

            frameSlider.min = "0";
            frameSlider.max = String(Math.max(0, replayFrames.length - 1));
            frameSlider.value = "0";
            updateFrameLabel();
            updateControlState();
            renderCurrentFrame(replayFrames[0] || null, replayIndex, replayFrames.length);
        }

        function applyLiveEvent(payload) {
            if (!payload || !payload.frame) {
                return;
            }
            mode = "live";
            modeLabelEl.textContent = "Live mode";
            stopReplayTimer();

            lastLiveEvent = payload;
            gameName = gameName || "";
            players = Array.isArray(payload.players) ? payload.players : players;
            pluginMeta = payload.plugin || pluginMeta;

            renderPlayers();
            maybeLoadPluginRenderer(pluginMeta, gameName).then(function () {
                renderCurrentFrame(payload.frame, payload.frame.move_index || 0, 0);
                setStatus("Live updates connected.", false);
            });
            updateControlState();
        }

        function connectLiveViaSSE() {
            const source = new EventSource(buildViewerURL("/viewer/live", { arena_id: arenaId }));
            source.addEventListener("frame", function (event) {
                try {
                    const payload = JSON.parse(event.data);
                    if (payload && !gameName && payload.plugin && payload.plugin.entry_url) {
                        const parsed = new URL(payload.plugin.entry_url, window.location.origin);
                        const g = parsed.searchParams.get("game");
                        if (g) {
                            gameName = g.toLowerCase();
                        }
                    }
                    applyLiveEvent(payload);
                } catch (err) {
                    setStatus("Failed to parse live frame: " + err, true);
                }
            });
            source.addEventListener("error", function (event) {
                if (event && event.data) {
                    setStatus(String(event.data), true);
                }
            });
            source.addEventListener("closed", function () {
                setStatus("Arena is no longer active.", true);
                source.close();
            });
        }

        function connectLive() {
            mode = "live";
            modeLabelEl.textContent = "Live mode";
            updateControlState();

            const wsURL = new URL(buildViewerURL("/viewer/live-ws", { arena_id: arenaId }));
            wsURL.protocol = wsURL.protocol === "https:" ? "wss:" : "ws:";
            const ws = new WebSocket(wsURL.toString());

            ws.onmessage = function (event) {
                try {
                    const envelope = JSON.parse(event.data);
                    const type = envelope && envelope.type;
                    const payload = envelope && envelope.payload;

                    if (type === "frame") {
                        if (payload && !gameName && payload.plugin && payload.plugin.entry_url) {
                            const parsed = new URL(payload.plugin.entry_url, window.location.origin);
                            const g = parsed.searchParams.get("game");
                            if (g) {
                                gameName = g.toLowerCase();
                            }
                        }
                        applyLiveEvent(payload);
                    } else if (type === "error") {
                        const msg = payload && payload.error ? payload.error : "Live stream error.";
                        setStatus(msg, true);
                    } else if (type === "closed") {
                        setStatus("Arena is no longer active.", true);
                        ws.close();
                    }
                } catch (err) {
                    setStatus("Failed to parse websocket message: " + err, true);
                }
            };

            ws.onerror = function () {
                setStatus("WebSocket unavailable, falling back to SSE...", false);
                connectLiveViaSSE();
            };
        }

        prevBtn.addEventListener("click", function () {
            if (replayFrames.length === 0) {
                return;
            }
            replayIndex = Math.max(0, replayIndex - 1);
            frameSlider.value = String(replayIndex);
            updateFrameLabel();
            renderCurrentFrame(replayFrames[replayIndex], replayIndex, replayFrames.length);
        });

        nextBtn.addEventListener("click", function () {
            if (replayFrames.length === 0) {
                return;
            }
            replayIndex = Math.min(replayFrames.length - 1, replayIndex + 1);
            frameSlider.value = String(replayIndex);
            updateFrameLabel();
            renderCurrentFrame(replayFrames[replayIndex], replayIndex, replayFrames.length);
        });

        playBtn.addEventListener("click", function () {
            if (mode !== "replay") {
                return;
            }
            if (replayTimer) {
                stopReplayTimer();
            } else {
                startReplayTimer();
            }
        });

        frameSlider.addEventListener("input", function () {
            if (replayFrames.length === 0) {
                return;
            }
            replayIndex = Number(frameSlider.value) || 0;
            updateFrameLabel();
            renderCurrentFrame(replayFrames[replayIndex], replayIndex, replayFrames.length);
        });

        speedSelect.addEventListener("change", function () {
            if (replayTimer) {
                startReplayTimer();
            }
        });

        window.BBSViewerPluginRuntime = {
            register: function (game, renderer) {
                const key = String(game || "").trim().toLowerCase();
                if (!key || !renderer || typeof renderer.render !== "function") {
                    return;
                }
                pluginRenderers.set(key, renderer);
                if (key === activePluginGame) {
                    activePluginRenderer = renderer;
                }
                if (mode === "replay" && replayFrames.length > 0) {
                    renderCurrentFrame(replayFrames[replayIndex], replayIndex, replayFrames.length);
                } else if (mode === "live" && lastLiveEvent && lastLiveEvent.frame) {
                    renderCurrentFrame(lastLiveEvent.frame, lastLiveEvent.frame.move_index || 0, 0);
                }
            },
        };

        updateControlState();

        if (matchId > 0) {
            loadReplay().catch(function (err) {
                setStatus(err && err.message ? err.message : String(err), true);
                clearCanvasNotice("Replay failed to load.");
            });
        } else if (arenaId > 0) {
            setStatus("Connecting to live stream...", false);
            connectLive();
        } else {
            mode = "idle";
            modeLabelEl.textContent = "No arena_id or match_id provided";
            clearCanvasNotice("No viewer source selected.");
            updateControlState();
        }
    })();
    </script>
</body>
</html>
