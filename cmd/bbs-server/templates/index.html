<!DOCTYPE html>
<html>
<head>
    <title>BBS Stadium Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>
    <style>
        :root {
            --bg: #f3efe5;
            --paper: #fffaf0;
            --ink: #14213d;
            --accent: #0b7285;
            --accent-2: #ef7d57;
            --line: #d8d1bf;
            --good: #2b9348;
            --warn: #bc6c25;
            --bad: #b7094c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, rgba(239, 125, 87, 0.12), transparent 30%),
                radial-gradient(circle at 90% 20%, rgba(11, 114, 133, 0.12), transparent 35%),
                var(--bg);
            min-height: 100vh;
        }

        .shell {
            width: min(1200px, 94vw);
            margin: 2rem auto 4rem;
        }

        .topbar {
            border: 2px solid var(--ink);
            background: var(--paper);
            padding: 1rem 1.2rem;
            box-shadow: 8px 8px 0 rgba(20, 33, 61, 0.2);
        }

        h1 {
            margin: 0;
            font-size: clamp(1.4rem, 3vw, 2rem);
            letter-spacing: 0.04em;
        }

        .subtitle {
            margin: 0.4rem 0 0;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.95rem;
            color: #274060;
        }

        .mode-row {
            margin-top: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }

        .badge {
            display: inline-block;
            border: 1px solid var(--ink);
            padding: 0.3rem 0.55rem;
            font-size: 0.85rem;
            font-family: "IBM Plex Mono", monospace;
            background: #f7f3ea;
        }

        .badge.admin { background: #ffe8cc; border-color: var(--warn); }

        .admin-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            align-items: center;
        }

        .admin-form input,
        .admin-form button {
            font: inherit;
            border: 1px solid var(--ink);
            padding: 0.38rem 0.55rem;
        }

        .admin-form button {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            cursor: pointer;
        }

        .live-shell {
            margin-top: 1.2rem;
        }

        .deck-grid {
            display: grid;
            gap: 1rem;
        }

        .panel {
            border: 2px solid var(--ink);
            background: var(--paper);
            padding: 1rem;
            box-shadow: 6px 6px 0 rgba(20, 33, 61, 0.15);
        }

        .panel h2 {
            margin: 0 0 0.75rem;
            font-size: 1.2rem;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.65rem;
        }

        .stat-card {
            border: 1px solid var(--line);
            background: white;
            padding: 0.65rem;
        }

        .stat-label {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.78rem;
            color: #445;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .generated-at {
            margin-top: 0.7rem;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.82rem;
            color: #445;
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--line);
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 640px;
        }

        th,
        td {
            text-align: left;
            padding: 0.5rem;
            border-bottom: 1px solid #ece6d8;
            vertical-align: top;
            font-size: 0.9rem;
        }

        th {
            font-family: "IBM Plex Mono", monospace;
            background: #f4efe2;
        }

        .pill {
            display: inline-block;
            margin-right: 0.3rem;
            margin-bottom: 0.2rem;
            border: 1px solid #aeb7c6;
            padding: 0.1rem 0.35rem;
            font-size: 0.75rem;
            font-family: "IBM Plex Mono", monospace;
            background: #f6f8fc;
        }

        .muted {
            color: #667;
            font-style: italic;
        }

        .empty {
            margin: 0;
            font-family: "IBM Plex Mono", monospace;
        }

        .arena-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.75rem;
        }

        .arena-card {
            border: 1px solid var(--line);
            background: white;
            padding: 0.75rem;
        }

        .arena-card h3 {
            margin: 0;
        }

        .arena-card header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .status {
            border: 1px solid var(--ink);
            padding: 0.15rem 0.4rem;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            text-transform: lowercase;
        }

        .status-active { background: #e6f7ef; border-color: var(--good); }
        .status-waiting { background: #fff3d9; border-color: var(--warn); }
        .status-completed,
        .status-aborted { background: #fde2e4; border-color: var(--bad); }

        dl {
            margin: 0;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.25rem 0.55rem;
            font-size: 0.87rem;
        }

        dt {
            font-family: "IBM Plex Mono", monospace;
            color: #334;
        }

        dd {
            margin: 0;
        }

        .players,
        .observers {
            margin-top: 0.65rem;
            font-size: 0.88rem;
        }

        .observers ul {
            margin: 0.35rem 0 0;
            padding-left: 1rem;
        }

        details {
            margin-top: 0.65rem;
        }

        summary {
            cursor: pointer;
            font-family: "IBM Plex Mono", monospace;
        }

        pre {
            overflow: auto;
            background: #182430;
            color: #b8f3d0;
            padding: 0.6rem;
            font-size: 0.78rem;
            font-family: "IBM Plex Mono", monospace;
        }

        .admin-intro {
            margin-top: 0;
            font-family: "IBM Plex Mono", monospace;
        }

        .admin-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 0.75rem;
        }

        .admin-action {
            display: grid;
            gap: 0.35rem;
            border: 1px solid var(--line);
            background: white;
            padding: 0.65rem;
        }

        .admin-action h3 {
            margin: 0 0 0.3rem;
            font-size: 1rem;
        }

        .admin-action label {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
        }

        .admin-action input,
        .admin-action select,
        .admin-action button {
            font: inherit;
            border: 1px solid var(--ink);
            padding: 0.35rem 0.5rem;
        }

        .admin-action button {
            background: var(--accent-2);
            color: white;
            border-color: var(--accent-2);
            cursor: pointer;
            font-weight: 600;
        }

        .admin-result {
            margin-top: 0.75rem;
            border: 1px solid;
            padding: 0.55rem;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
        }

        .admin-result.success {
            border-color: var(--good);
            background: #e8f8ed;
        }

        .admin-result.error {
            border-color: var(--bad);
            background: #fde2e4;
        }

        @media (max-width: 720px) {
            .shell {
                width: 96vw;
                margin-top: 1rem;
            }

            .topbar,
            .panel {
                padding: 0.8rem;
            }

            table {
                min-width: 560px;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <h1>Build-a-Bot Stadium Control Deck</h1>
            <p class="subtitle">Live manager state streamed from in-memory runtime</p>

            <div class="mode-row">
                <span class="badge">Viewer mode</span>
                {{if .AdminConfigured}}
                    {{if .IsAdmin}}
                        <span class="badge admin">Admin mode active</span>
                    {{else}}
                        <form method="GET" action="/" class="admin-form">
                            <label for="admin_key">Admin key</label>
                            <input id="admin_key" type="password" name="admin_key" value="{{.AdminKey}}" autocomplete="off" />
                            <button type="submit">Enable admin</button>
                        </form>
                    {{end}}
                {{else}}
                    <span class="badge">Admin disabled (`BBS_DASHBOARD_ADMIN_KEY` not set)</span>
                {{end}}
            </div>
        </header>

        <main class="live-shell">
            <div hx-ext="sse" sse-connect="/dashboard-sse{{if .AdminKey}}?admin_key={{.AdminKey | urlquery}}{{end}}">
                <div sse-swap="state">
                    <div class="topbar">
                        Connecting to live state stream...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.body.addEventListener("htmx:sseError", function () {
            console.warn("Dashboard SSE disconnected or errored");
        });
    </script>
 </body>
</html>
