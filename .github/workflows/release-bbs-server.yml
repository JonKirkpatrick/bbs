name: Release bbs-server

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            build_version="${GITHUB_REF_NAME}"
          else
            build_version="${TAG_INPUT}"
          fi
          if [[ -z "$build_version" ]]; then
            build_version="unreleased"
          fi
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.buildVersion=${build_version}" -o "dist/bbs-server-linux-${GOARCH}" ./cmd/bbs-server

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbs-server-linux-${{ matrix.arch }}
          path: dist/bbs-server-linux-${{ matrix.arch }}

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bbs-server-linux-*
          merge-multiple: true
          path: dist

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=bbs-server ${tag}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          generate_release_notes: true
          files: |
            dist/bbs-server-linux-amd64
            dist/bbs-server-linux-arm64
          fail_on_unmatched_files: true
