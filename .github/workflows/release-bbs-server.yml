name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            build_version="${GITHUB_REF_NAME}"
          else
            build_version="${TAG_INPUT}"
          fi
          if [[ -z "$build_version" ]]; then
            build_version="unreleased"
          fi
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.buildVersion=${build_version}" -o "dist/bbs-server-linux-${GOARCH}" ./cmd/bbs-server

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbs-server-linux-${{ matrix.arch }}
          path: dist/bbs-server-linux-${{ matrix.arch }}

  build_debs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build server .deb package
        shell: bash
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${TAG_INPUT}"
          fi
          version="${tag#v}"
          ./scripts/build-deb.sh "${version}"

      - name: Build client .deb package
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-client-deb.sh

      - name: Upload server .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbs-server-deb-amd64
          path: build/deb/bbs-server_*_amd64.deb

      - name: Upload client .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbs-client-deb-amd64
          path: build/deb-client/bbs-client_*_amd64.deb

  release:
    runs-on: ubuntu-latest
    needs:
      - build_binaries
      - build_debs

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bbs-server-linux-*
          merge-multiple: true
          path: dist

      - name: Download Debian package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bbs-*-deb-amd64
          merge-multiple: true
          path: dist

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=Build-a-Bot Stadium ${tag}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          generate_release_notes: true
          files: |
            dist/bbs-server-linux-amd64
            dist/bbs-server-linux-arm64
            dist/bbs-server_*_amd64.deb
            dist/bbs-client_*_amd64.deb
          fail_on_unmatched_files: true
